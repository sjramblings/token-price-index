name: Deploy to GitHub Pages

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: [main]

# Single in-flight deploy. cancel-in-progress: false lets a redeploy queue
# behind any active one rather than aborting it mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Build dashboard
        # `bun run build` triggers `prebuild` which copies ../data -> public/data
        # so the bundled dist contains current.json + every dated history file.
        working-directory: dashboard
        run: bun run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dist as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
