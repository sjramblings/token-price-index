name: Daily Refresh

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    # 17:00 UTC daily -- ~03:00 AEST. Matches aws-well-architected-corpus
    # for a consolidated overnight refresh window.
    - cron: '0 17 * * *'

permissions:
  contents: write

# One refresh in flight at a time. Prevents racing same-day runs against
# each other on the BuildRelease idempotency guard.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Fetch, normalize, commit, release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history + tags so BuildRelease can detect existing same-day tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch LiteLLM
        run: bun scripts/FetchLiteLLM.ts

      - name: Fetch OpenRouter
        run: bun scripts/FetchOpenRouter.ts

      - name: Normalize
        run: bun scripts/Normalize.ts

      - name: Verify
        run: bun scripts/Verify.ts

      - name: Diff
        run: bun scripts/Diff.ts

      - name: Commit if data/ changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "[commit] no data/ changes -- skipping commit"
          else
            git add data/
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "[commit] data/ updated -- pushed to main"
          fi

      - name: Cut release if content changed
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/BuildRelease.ts
