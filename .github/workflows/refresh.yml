name: Daily Refresh

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    # 17:00 UTC daily -- ~03:00 AEST. Matches aws-well-architected-corpus
    # for a consolidated overnight refresh window.
    - cron: '0 17 * * *'

permissions:
  contents: write
  # actions: write is required by the final "Trigger Pages deploy" step,
  # which calls the REST Create-Workflow-Dispatch endpoint via gh CLI.
  # Without it, GH_TOKEN gets 403 on the dispatch and Pages stays frozen
  # on the last code-PR-authored push. Codex P1 on PR #5.
  actions: write

# One refresh in flight at a time. Prevents racing same-day runs against
# each other on the BuildRelease idempotency guard.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Fetch, normalize, commit, release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history + tags so BuildRelease can detect existing same-day tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch LiteLLM
        run: bun scripts/FetchLiteLLM.ts

      - name: Fetch OpenRouter
        run: bun scripts/FetchOpenRouter.ts

      - name: Normalize
        run: bun scripts/Normalize.ts

      - name: Verify
        run: bun scripts/Verify.ts

      - name: Diff
        run: bun scripts/Diff.ts

      - name: Commit if data/ changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "[commit] no data/ changes -- skipping commit"
          else
            git add data/
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%d)"
            git push
            echo "[commit] data/ updated -- pushed to main"
          fi

      # Always run BuildRelease. Two internal gates handle the cases the workflow
      # used to gate externally: (1) zero-content-change days short-circuit with
      # "no content changes -- skipping release"; (2) same-day retries after a
      # successful release short-circuit via releaseExists() with "already exists
      # -- idempotent retry". Gating on the prior commit step's output blocked
      # retry recovery after a partial-failure (commit landed but release didn't),
      # since the retry would see no new data/ diff and skip release entirely.
      # Codex P1 on PR #3.
      - name: Cut release (idempotent — guarded inside BuildRelease.ts)
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/BuildRelease.ts

      # GitHub Actions blocks downstream workflow triggers from pushes made with
      # the default GITHUB_TOKEN to avoid recursion. Without this explicit dispatch,
      # the deploy.yml workflow would not see daily data commits and Pages would
      # stay frozen on whatever was current when the last code PR merged.
      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
